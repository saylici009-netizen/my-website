                        slideIn: {
                            '0%': { transform: 'translateX(100%)' },
                            '100%': { transform: 'translateX(0)' },
                        },
                        slideDown: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        successPop: {
                            '0%': { transform: 'scale(1)' },

    <style>
        .glass-effect {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
        }

        .dark .glass-effect {
            background: rgba(0, 0, 0, 0.3);
        }

        html {
            scroll-behavior: smooth;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .payment-radio:checked+label {
            border-color: #ec5b13;
            background-color: rgba(236, 91, 19, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        /* Scroll-reveal */
        .reveal {
            opacity: 0;
            transform: translateY(36px);
            transition: opacity 0.72s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.72s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-left {
            opacity: 0;
            transform: translateX(-48px);
            transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal-left.revealed {
            opacity: 1;
            transform: translateX(0);
        }

        .reveal-right {
            opacity: 0;
            transform: translateX(48px);
            transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal-right.revealed {
            opacity: 1;
            transform: translateX(0);
        }

        .reveal-delay-1 {
            transition-delay: 0.1s;
        }

        .reveal-delay-2 {
            transition-delay: 0.22s;
        }

        .reveal-delay-3 {
            transition-delay: 0.34s;
        }

        /* About cards hover shimmer */
        .about-card {
            position: relative;
            overflow: hidden;
        }

        .about-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(236, 91, 19, 0.08) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .about-card:hover::before {
            opacity: 1;
        }

        .about-card:hover {
            transform: translateY(-4px);
        }

        .about-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .about-card:hover {
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.12);
        }

        @keyframes progressBar {
            0% {
                width: 0%;
            }

            30% {
                width: 40%;
            }

            60% {
                width: 70%;
            }

            90% {
                width: 90%;
            }

            100% {
                width: 100%;
            }
        }
    </style>
</head>

            const [errors, setErrors] = useState({});
            const subtotal = useMemo(() => cart.reduce((acc, item) => acc + (item.price * item.quantity), 0), [cart]);

            // Form fields
            const [fullName, setFullName] = useState('');
            const [district, setDistrict] = useState('26 June, Hargeisa');
            const [phone, setPhone] = useState('');
            const [transactionId, setTransactionId] = useState('');
            const [cardNumber, setCardNumber] = useState('');
            const [cardExpiry, setCardExpiry] = useState('');
            const [cardCvv, setCardCvv] = useState('');

            const validate = () => {
                const newErrors = {};
                if (!fullName.trim()) newErrors.fullName = 'Fadlan geli magacaaga (Please enter your name)';
                if (!phone.trim() || phone.trim().length < 7) newErrors.phone = 'Fadlan geli lambarka taleefanka (Please enter valid phone)';

                if (paymentMethod === 'zaad' || paymentMethod === 'edahab') {
                    if (!transactionId.trim()) newErrors.transactionId = 'Fadlan geli Transaction ID-ga (Please enter Transaction ID)';
                }
                if (paymentMethod === 'card') {
                    if (!cardNumber.trim() || cardNumber.replace(/\s/g, '').length < 13) newErrors.cardNumber = 'Card number is invalid';
                    if (!cardExpiry.trim()) newErrors.cardExpiry = 'Expiry date required';
                    if (!cardCvv.trim() || cardCvv.length < 3) newErrors.cardCvv = 'CVV required';
                }

                if (cart.length === 0) newErrors.cart = 'Your cart is empty';

                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleCompleteOrder = () => {
                if (!validate()) {
                    // Scroll to first error
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }

                setIsProcessing(true);

                // Simulate payment processing
                setTimeout(() => {
                    const orderId = `DB-${Date.now().toString().slice(-6)}`;
                    const orderDetails = {
                        orderId,
                        items: [...cart],
                        subtotal,
                        paymentMethod,
                        transactionId: transactionId || undefined,
                        customerName: fullName,
                        district,
                        phone,
                        date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),

                    onOrderComplete(orderDetails);
                    setIsProcessing(false);
                    navigate('/order-confirmation');

        const getPasswordStrength = (pwd) => {
            if (!pwd) return { score: 0, label: '', color: '' };
            let score = 0;
            if (pwd.length >= 8) score++;
            if (pwd.length >= 12) score++;
            if (/[A-Z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;
            if (score <= 1) return { score: 1, label: 'Daciif (Weak)', color: 'bg-red-500' };
            if (score <= 2) return { score: 2, label: 'Dhexdhexaad (Fair)', color: 'bg-orange-500' };
            if (score <= 3) return { score: 3, label: 'Fiican (Good)', color: 'bg-yellow-500' };
            if (score <= 4) return { score: 4, label: 'Xoog badan (Strong)', color: 'bg-green-500' };
            return { score: 5, label: 'Aad u xooggan! (Very Strong)', color: 'bg-emerald-500' };

                    return [...prev, { ...product, quantity: 1 }];

                        return { ...item, quantity: newQty };

                            email: targetEmail,
                            name: targetName,
                            otp: generatedOtp
                        })
                    });

                    if (response.ok) {
                        console.log(`[DR BILE] ✅ OTP email requested for ${targetEmail}`);
                    } else {
                        throw new Error('Backend failed to send email');
                    }
                } catch (error) {
                    console.warn(`[DR BILE] ❌ ${error.message}. Falling back to demo mode.`);
                    showDemoOtp(generatedOtp);
                }
                return generatedOtp;
            };

            const showDemoOtp = (code) => {
                setDemoToast(code);
                setTimeout(() => setDemoToast(null), 15000);
            };

            const register = (name, email, password) => {
                // Duplicate email check
                if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) {
                    return { error: 'Email-kaan horey ayaa loo isticmaalay. (This email is already registered)' };
                }
                // Password validation
                if (password.length < 8) {
                    return { error: 'Password waa in uu ugu yaraan 8 xaraf yahay. (Min 8 characters)' };
                }

                const newUser = { name, email, password, verified: false };
                setUsers(prev => [...prev, newUser]);
                setUser(newUser);
                generateAndSendOtp(email, name);
                return { success: true };
            };

            const resendOtp = () => {
                if (user) {
                    generateAndSendOtp(user.email, user.name);
                }
            };

            const verifyOtp = (enteredOtp) => {
                // Check expiry
                if (otpTimestamp && (Date.now() - otpTimestamp > OTP_EXPIRY_MS)) {
                    return false; // Expired
                }
                if (enteredOtp === otp) {
                    setUser(prev => ({ ...prev, verified: true }));
                    setUsers(prev => prev.map(u => u.email === user.email ? { ...u, verified: true } : u));
                    setOtp(null);
                    return true;
                }
                return false;
            };

            const logout = () => {
                setUser(null);
                navigate('/');
            };

            const ProtectedRoute = ({ children, requireVerified = true }) => {
                if (!user) return <Navigate to="/login" />;
                if (requireVerified && !user.verified) return <Navigate to="/verify" />;
                return children;
            };

            const cartCount = useMemo(() => cart.reduce((acc, item) => acc + item.quantity, 0), [cart]);

            const isAdmin = location.pathname.startsWith('/admin');

            return (
                <div className="flex flex-col min-h-screen">
                    {!isAdmin && <NavHeader cartCount={cartCount} onOpenCart={() => setIsCartOpen(true)} user={user} onLogout={logout} />}

                    <main className="flex-grow">
                        <Routes>
                            <Route path="/" element={<HomePage />} />
                            <Route path="/shop" element={<ShopPage addToCart={addToCart} />} />
                            <Route path="/collections" element={<CollectionsPage />} />
                            <Route path="/about" element={<AboutPage />} />
                            <Route path="/login" element={<LoginPage onLogin={login} onRegister={register} user={user} />} />
                            <Route path="/verify" element={<VerifyPage user={user} onVerify={verifyOtp} onResendOtp={resendOtp} />} />
                            <Route path="/checkout" element={<ProtectedRoute><CheckoutPage cart={cart} onOrderComplete={handleOrderComplete} /></ProtectedRoute>} />
                            <Route path="/order-confirmation" element={<OrderConfirmationPage orderDetails={orderDetails} onGoHome={() => navigate('/')} onGoShop={() => navigate('/shop')} />} />
                            <Route path="/admin" element={<AdminPage users={users} />} />
                        </Routes>

                        {/* Demo OTP Toast (visible when SMTP fails or is unconfigured) */}
                        <div className={`fixed bottom-8 right-8 z-[200] transition-all duration-500 ${demoToast ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 pointer-events-none'}`}>
                            <div className="bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 px-6 py-4 rounded-xl shadow-2xl border border-zinc-700 dark:border-zinc-300 max-w-xs">
                                <div className="flex items-center gap-2 mb-2">
                                    <span className="material-symbols-outlined text-[#D4AF37]" style={{ fontVariationSettings: "'FILL' 1" }}>key</span>
                                    <span className="text-xs font-bold uppercase tracking-widest">Demo OTP Code</span>
                                </div>
                                <p className="text-2xl font-bold font-mono tracking-[0.3em] text-center py-2">{demoToast}</p>
                                <p className="text-[10px] text-zinc-400 dark:text-zinc-500 text-center">Configure .env to send real emails via SMTP</p>
                            </div>
                        </div>
                    </main>

                    {!isAdmin && <Footer />}

                    <CartSidebar
                        isOpen={isCartOpen}
                        onClose={() => setIsCartOpen(false)}
                        cart={cart}
                        updateQuantity={updateQuantity}
                        removeItem={removeItem}
                    />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
</body>

</html>
