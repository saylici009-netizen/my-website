                                    return (
                                    <div className="flex flex-col min-h-screen">
                                        {!isAdmin && <NavHeader cartCount={cartCount} onOpenCart={()=>
                                            setIsCartOpen(true)} user={user} onLogout={logout} />}

                                            <main className="flex-grow">
                                                <Routes>
                                                    <Route path="/" element={<HomePage />} />
                                                    <Route path="/shop" element={<ShopPage addToCart={addToCart} />} />
                                                    <Route path="/collections" element={<CollectionsPage />} />
                                                    <Route path="/about" element={<AboutPage />} />
                                                    <Route path="/login" element={<LoginPage onLogin={login}
                                                        onRegister={register} user={user} onOAuthLogin={oauthLogin}
                                                        onForgotPassword={handleForgotPassword} />} />
                                                    <Route path="/verify" element={<VerifyPage user={user}
                                                        onVerify={verifyOtp} onResendOtp={resendOtp} />} />
                                                    <Route path="/checkout" element={<ProtectedRoute>
                                                        <CheckoutPage cart={cart}
                                                            onOrderComplete={handleOrderComplete} />
                                                        </ProtectedRoute>} />
                                                        <Route path="/order-confirmation"
                                                            element={<OrderConfirmationPage orderDetails={orderDetails}
                                                            onGoHome={()=> navigate('/')} onGoShop={() =>
                                                            navigate('/shop')} />} />
                                                            <Route path="/admin" element={<AdminPage users={users} user={user} />} />
                                                </Routes>

                                                {/* Email OTP sent directly to user's email */}
                                            </main>

                                            {!isAdmin &&
                                            <Footer />}

                                            <CartSidebar isOpen={isCartOpen} onClose={()=> setIsCartOpen(false)}
                                                cart={cart}
                                                updateQuantity={updateQuantity}
                                                removeItem={removeItem}
                                                />
                                    </div>
                                    );
                                    };

        const root = createRoot(document.getElementById('root'));
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
</body>
</html>
